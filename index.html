<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auf’m Hennekamp – Speisekarte</title>

<style>
:root {
    --bg: #f7f4ef;
    --card: #ffffff;
    --text: #1f2933;
    --muted: #6b7280;
    --accent: #1f2937;
    --border: #e5e0d8;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
}

.wrapper {
    max-width: 720px;
    margin: 0 auto;
    padding: 42px 18px;
}

.hero {
    text-align: center;
    margin-bottom: 34px;
}

.logo {
    font-size: 42px;
    margin-bottom: 12px;
}

h1 {
    margin: 0;
    font-size: 34px;
    letter-spacing: -0.5px;
}

.subtitle {
    margin-top: 10px;
    color: var(--muted);
    font-size: 17px;
}

.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.lang {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 15px 16px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: #fff;
    color: var(--text);
    text-decoration: none;
    font-size: 17px;
    font-weight: 600;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
}

.lang:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 18px rgba(0,0,0,0.08);
    border-color: #c9c1b6;
}

.flag {
    font-size: 22px;
}

.footer {
    text-align: center;
    margin-top: 26px;
    color: var(--muted);
    font-size: 14px;
}

@media (max-width: 560px) {
    .wrapper {
        padding: 28px 14px;
    }

    h1 {
        font-size: 28px;
    }

    .grid {
        grid-template-columns: 1fr;
    }

    .lang {
        font-size: 16px;
        padding: 14px 15px;
    }
}
</style>
</head>

<body>
    
    <script>
const userLang = navigator.language || navigator.userLanguage;

const languageMap = {
    "de": "Deutsch.html",
    "en": "English.html",
    "fr": "Français.html",
    "it": "Italiano.html",
    "es": "Español.html",
    "el": "Ελληνικά.html",
    "tr": "Türkçe.html",
    "ru": "Русский.html",
    "zh": "中文.html",
    "ko": "한국어.html",
    "vi": "Tiếng Việt.html",
    "ar": "العربية.html",
    "ja": "日本語.html",
    "hr": "Hrvatski.html",
    "pt": "Português.html"
};

const langCode = userLang.split("-")[0];
const target = languageMap[langCode];

window.addEventListener("DOMContentLoaded", () => {
    if (target) {
        const box = document.createElement("div");
        box.innerHTML = `
            <a href="${target}" style="
                display:block;
                max-width:720px;
                margin:20px auto;
                padding:16px;
                border-radius:14px;
                background:#1f2937;
                color:white;
                text-align:center;
                text-decoration:none;
                font-weight:700;
                font-size:18px;
            ">
                Empfohlene Sprache öffnen / Open suggested language
            </a>
        `;
        document.body.prepend(box);
    }
});
</script>
<div class="wrapper">

    <div class="hero">
        <div class="logo">🍽️</div>
        <h1>Auf’m Hennekamp</h1>
        <div class="subtitle">Speisekarte · Choose your language</div>
    </div>

    <div class="card">
        <div class="grid">
            <a class="lang" href="Deutsch.html"><span>Deutsch</span><span class="flag">🇩🇪</span></a>
            <a class="lang" href="English.html"><span>English</span><span class="flag">🇬🇧</span></a>
            <a class="lang" href="Français.html"><span>Français</span><span class="flag">🇫🇷</span></a>
            <a class="lang" href="Italiano.html"><span>Italiano</span><span class="flag">🇮🇹</span></a>
            <a class="lang" href="Español.html"><span>Español</span><span class="flag">🇪🇸</span></a>
            <a class="lang" href="Ελληνικά.html"><span>Ελληνικά</span><span class="flag">🇬🇷</span></a>
            <a class="lang" href="Türkçe.html"><span>Türkçe</span><span class="flag">🇹🇷</span></a>
            <a class="lang" href="Русский.html"><span>Русский</span><span class="flag">🇷🇺</span></a>
            <a class="lang" href="中文.html"><span>中文</span><span class="flag">🇨🇳</span></a>
            <a class="lang" href="한국어.html"><span>한국어</span><span class="flag">🇰🇷</span></a>
            <a class="lang" href="Tiếng Việt.html"><span>Tiếng Việt</span><span class="flag">🇻🇳</span></a>
            <a class="lang" href="العربية.html"><span>العربية</span><span class="flag">🇸🇦</span></a>
            <a class="lang" href="日本語.html"><span>日本語</span><span class="flag">🇯🇵</span></a>
            <a class="lang" href="Hrvatski.html"><span>Hrvatski</span><span class="flag">🇭🇷</span></a>
            <a class="lang" href="Português.html"><span>Português</span><span class="flag">🇵🇹</span></a>
        </div>
    </div>

    <div class="footer">
        Griechische Spezialitäten · Rheinische Klassiker · Düsseldorf
    </div>

</div>
</body>
</html>
